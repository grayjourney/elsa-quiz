services:
  quiz:
    build: .
    profiles: ["full"]            # Mode A only; omit profile for Mode B (infra-only)
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      BASE_POINTS: "${BASE_POINTS:-10}"
    healthcheck:
      test: ["CMD", "/quiz", "-health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks: [quiznet]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Prometheus scrape the host (Mode B), incl. Linux
    networks: [quiznet]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]
    networks: [quiznet]

networks:
  quiznet:
    driver: bridge
