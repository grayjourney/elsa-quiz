services:
  quiz:
    build: .
    profiles: ["full"]            # Mode A only; omit profile for Mode B (infra-only)
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      BASE_POINTS: "${BASE_POINTS:-10}"
    healthcheck:
      test: ["CMD", "/quiz", "-health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks: [quiznet]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Prometheus scrape the host (Mode B), incl. Linux
    networks: [quiznet]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [quiznet]

  # Log aggregation so slog output is viewable in Grafana (not just `make logs`).
  # Loki stores logs; Promtail ships the quiz container's stdout into Loki.
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks: [quiznet]

  promtail:
    image: grafana/promtail:latest
    profiles: ["full"]              # scrapes the quiz CONTAINER, so Mode A only
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [quiznet]

networks:
  quiznet:
    driver: bridge
